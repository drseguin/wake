services:
  nginx:
    build:
      context: ./nginx
      args:
        APP_HOST: ${APP_HOST:-localhost}
    container_name: wake-app-nginx
    ports:
      - "${APP_PORT:?APP_PORT must be set in your .env file}:443"
      - "8443:8443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - wake-app-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: wake-app-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 3s
    networks:
      - wake-app-net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: wake-app-backend
    environment:
      - APP_NAME=${APP_NAME:-WAKE App}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-dev-secret-key-change-in-production}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg://wake:${WAKE_DB_PASSWORD:-wake}@wake-db:5432/wake
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    depends_on:
      redis:
        condition: service_healthy
      wake-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/api/v1/health', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    networks:
      - wake-app-net
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: wake-app-keycloak
    command: start-dev --import-realm
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
      - KC_HOSTNAME=https://localhost:8443
      - KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
      - KC_SPI_THEME_CACHE_THEMES=false
      - KC_SPI_THEME_CACHE_TEMPLATES=false
      - KC_SPI_THEME_STATIC_MAX_AGE=-1
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    # Keycloak 26's minimal runtime image has no curl and its bash is minimal,
    # so we avoid an in-container healthcheck here. start.sh polls the
    # public /health/ready endpoint externally during boot instead.
    networks:
      - wake-app-net
    restart: unless-stopped

  keycloak-db:
    image: postgres:16-alpine
    container_name: wake-app-keycloak-db
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wake-app-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wake-app-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wake-app-net
    restart: unless-stopped

  wake-db:
    image: postgis/postgis:16-3.4
    container_name: wake-app-wake-db
    environment:
      - POSTGRES_DB=wake
      - POSTGRES_USER=wake
      - POSTGRES_PASSWORD=${WAKE_DB_PASSWORD:-wake}
    volumes:
      - wake-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wake -d wake"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wake-app-net
    restart: unless-stopped

volumes:
  keycloak-db-data:
  wake-db-data:

networks:
  wake-app-net:
    driver: bridge
